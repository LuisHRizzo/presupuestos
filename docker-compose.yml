version: '3.8'

# ─────────────────────────────────────────────────────────
# IOTEC / 01Infinito — Sistema de Cotización Ágil
#
# NOTA para Coolify:
#   Los puertos NO se mapean aquí — Coolify los gestiona
#   automáticamente con Traefik. Configurar el puerto en
#   la UI de Coolify apuntando al servicio "frontend" port 80.
#
# Arranque local (sin Coolify):
#   docker compose up --build
#   → frontend en http://localhost:3000
#   → backend  en http://localhost:3001
# ─────────────────────────────────────────────────────────

services:

  # ── Backend — Node.js + Prisma + SQLite ───────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: iotec-backend
    environment:
      DATABASE_URL: "file:/app/data/prod.db"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      NODE_ENV: "production"
    volumes:
      - db-data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3001/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 90s
    restart: unless-stopped
    expose:
      - "3001"

  # ── Frontend — Nginx sirviendo Vite build ─────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: iotec-frontend
    depends_on:
      - backend
    restart: unless-stopped
    expose:
      - "80"

# ── Volumen para la DB SQLite ──────────────────────────
volumes:
  db-data:
    driver: local
