version: '3.8'

# ─────────────────────────────────────────────────────────
# IOTEC / 01Infinito — Sistema de Cotización Ágil
#
# Arranque:
#   docker compose up --build        (primera vez)
#   docker compose up -d             (siguientes veces)
#   docker compose down              (apagar todo)
#   docker compose logs -f backend   (ver logs del backend)
# ─────────────────────────────────────────────────────────

services:

  # ── Backend ────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: iotec-backend
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: "file:/app/data/prod.db"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      NODE_ENV: "production"
    volumes:
      - db-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 90s
    restart: unless-stopped

  # ── Frontend ───────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: iotec-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend         # Solo espera que el contenedor arranque, no que sea healthy
    restart: unless-stopped

# ── Volumen para la DB SQLite ──────────────────────────
volumes:
  db-data:
    driver: local
